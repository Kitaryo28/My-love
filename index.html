<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Love Mail 💌</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
padding:20px 0;

display:flex;
justify-content:center;
align-items:flex-start;

overflow-y:auto;
overflow-x:hidden;

position:relative;

background:
linear-gradient(
rgba(10,10,20,.65),
rgba(10,10,20,.85)
),
url("https://i.postimg.cc/GhVC12QK/Picsart-26-06-21-22-07-31-554.png");

background-size:cover;
background-position:center;

color:white;
}

/* White Glow */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(
circle,
rgba(255,255,255,.08),
transparent 65%
);

pointer-events:none;
}

/* Floating Hearts */

.heart{
position:fixed;
width:12px;
height:12px;

background:#ff6b9d;

transform:rotate(45deg);

opacity:.25;

pointer-events:none;

animation:float 8s linear infinite;
}

.heart::before,
.heart::after{

content:"";

position:absolute;

width:12px;
height:12px;

background:#ff6b9d;

border-radius:50%;
}

.heart::before{
top:-6px;
left:0;
}

.heart::after{
left:-6px;
top:0;
}

@keyframes float{

0%{
transform:
translateY(100vh)
rotate(45deg);
}

100%{
transform:
translateY(-10vh)
rotate(45deg);
}

}

.container{
width:100%;
max-width:430px;
padding:15px;
z-index:2;
}

.card{

background:
rgba(255,255,255,.08);

backdrop-filter:
blur(16px);

border:
1px solid rgba(255,255,255,.12);

border-radius:24px;

padding:24px;

box-shadow:
0 0 40px rgba(255,255,255,.08);
}

.hidden{
display:none;
}

/* PASSWORD SCREEN */

.cover{
text-align:center;
}

.cover .emoji{
font-size:36px;
margin-bottom:10px;
}

.cover h1{
font-size:24px;
font-weight:600;
}

.cover p{
font-size:13px;
opacity:.8;
margin-top:5px;
}

.input{

width:100%;

margin-top:20px;

padding:14px;

border:none;
outline:none;

border-radius:12px;

background:
rgba(255,255,255,.12);

color:white;

text-align:center;
font-size:15px;
}

.input::placeholder{
color:
rgba(255,255,255,.65);
}

.btn{

width:100%;

margin-top:12px;

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:600;

background:
linear-gradient(
45deg,
#ff5b8a,
#ff8db0
);

color:white;
}

.btn:hover{
transform:translateY(-2px);
}

.hint{
margin-top:12px;
text-align:center;
font-size:12px;
opacity:.7;
}

/* LOADING SCREEN */

.loading{
text-align:center;
padding:25px;
}

.spinner{
width:38px;
height:38px;

margin:auto;

border-radius:50%;

border:3px solid rgba(255,255,255,.2);
border-top:3px solid white;

animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loading p{
margin-top:12px;
font-size:14px;
}

/* LETTER SCREEN */

.mail-header{
margin-bottom:15px;
}

.from,
.to{
font-size:14px;
margin-bottom:5px;
}

.from b,
.to b{
color:#ffd6e3;
}

.letter{
white-space:pre-wrap;
line-height:1.8;
font-size:14px;
margin-top:10px;

/* Scroll Fix */
max-height:420px;
overflow-y:auto;
padding-right:5px;
}

.ask{
margin-top:20px;
padding-top:15px;
border-top:1px dashed rgba(255,255,255,.25);
text-align:center;
}

.question{
font-size:15px;
font-weight:600;
color:#ffd6e3;
margin-bottom:12px;
}

.buttons{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.yes-btn,
.no-btn{
padding:10px 20px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:600;
}

.yes-btn{
background:#ff5b8a;
color:white;
}

.no-btn{
background:white;
color:#333;
position:relative;
}

.reply{
margin-top:18px;
text-align:center;
font-weight:600;
line-height:1.8;
color:#ffd6e3;
}

</style>
</head>

<body>

<div class="container">

<!-- Loading -->

<div id="loadingScreen" class="card hidden">
<div class="loading">
<div class="spinner"></div>
<p>☕💕 Loading your letter...</p>
</div>
</div>

<!-- Password -->

<div id="lockScreen" class="card">

<div class="cover">
<div class="emoji">☕💕</div>
<h1>Private Love Mail</h1>
<p>Only for Darling ♡</p>
</div>

<input
id="password"
class="input"
placeholder="Enter the secret word..."
autocomplete="off"
>

<button
class="btn"
onclick="openMail()">
✨ Open My Heart
</button>

<div class="hint">
💌 Hint: three magical words
</div>

</div>

<!-- Letter -->

<div id="mailScreen" class="card hidden">

<div class="mail-header">

<div class="from">
<b>From:</b> Kitaryo ☕
</div>

<div class="to">
<b>To:</b> Darling 💕
</div>

</div>

<div id="letter" class="letter"></div>

<div id="askBox" class="ask hidden">

<div class="question">
Are you still love me if I became stone? 🪨💖
</div>

<div class="buttons">

<button
class="yes-btn"
onclick="sayYes()">
Yes ♡
</button>

<button
class="no-btn"
id="noBtn">
No
</button>

</div>

</div>

<div
id="replyBox"
class="reply hidden">
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
